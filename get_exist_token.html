<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Get Exist.io Token</title>
  <style>
    body { font-family: Inter, system-ui, sans-serif; max-width: 420px; margin: 80px auto; padding: 0 1rem; }
    h2   { font-size: 1.2rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.25rem; color: #444; }
    input { width: 100%; box-sizing: border-box; padding: 0.55rem 0.75rem; border: 1px solid #ccc;
            border-radius: 8px; font-size: 0.95rem; margin-bottom: 1rem; }
    button { width: 100%; padding: 0.65rem; background: #0053e2; color: white;
             border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
    #result { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; font-size: 0.85rem; display: none; }
    #result.ok  { background: #f0fdf4; border: 1px solid #86efac; }
    #result.err { background: #fff1f0; border: 1px solid #fca5a5; }
    #token-val  { font-family: monospace; font-size: 0.78rem; word-break: break-all;
                  background: #f5f5f5; padding: 0.5rem; border-radius: 6px; margin: 0.5rem 0; }
    .copy-btn   { margin-top: 0.5rem; padding: 0.4rem 0.9rem; background: #0053e2; color: white;
                  border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
  </style>
</head>
<body>
  <h2>🔑 Get your Exist.io API token</h2>

  <label>Exist.io username</label>
  <input id="username" type="text" placeholder="davelane26" value="davelane26" />

  <label>Exist.io password</label>
  <input id="password" type="password" placeholder="your password" />

  <button id="btn" onclick="getToken()">Get Token</button>

  <div id="result">
    <strong id="result-title"></strong>
    <div id="token-val"></div>
    <button class="copy-btn" id="copy-btn" onclick="copyToken()" style="display:none">📋 Copy token</button>
    <p id="result-msg" style="margin:0.5rem 0 0"></p>
  </div>

  <script>
    let currentToken = '';

    async function getToken() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const btn      = document.getElementById('btn');
      const result   = document.getElementById('result');

      if (!username || !password) {
        alert('Enter both username and password.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Fetching…';
      result.style.display = 'none';

      try {
        const res = await fetch('https://exist.io/api/2/auth/simple-token/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
        });

        const data = await res.json();

        if (res.ok && data.token) {
          currentToken = data.token;
          result.className = 'result ok';
          document.getElementById('result-title').textContent = '✅ Your token:';
          document.getElementById('token-val').textContent = data.token;
          document.getElementById('copy-btn').style.display = 'inline-block';
          document.getElementById('result-msg').textContent =
            'Add this as EXIST_TOKEN in your GitHub secrets.';
        } else {
          result.className = 'result err';
          document.getElementById('result-title').textContent = '❌ Failed';
          document.getElementById('token-val').textContent = '';
          document.getElementById('copy-btn').style.display = 'none';
          document.getElementById('result-msg').textContent =
            data.non_field_errors?.[0] || JSON.stringify(data);
        }
      } catch (e) {
        result.className = 'result err';
        document.getElementById('result-title').textContent = '❌ Network error';
        document.getElementById('token-val').textContent = '';
        document.getElementById('result-msg').textContent = e.message;
      }

      result.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Get Token';
    }

    function copyToken() {
      navigator.clipboard.writeText(currentToken);
      document.getElementById('copy-btn').textContent = '✅ Copied!';
      setTimeout(() => document.getElementById('copy-btn').textContent = '📋 Copy token', 2000);
    }
  </script>
</body>
</html>
