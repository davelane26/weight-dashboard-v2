name: Weekly AI Health Summary

on:
  schedule:
    - cron: '0 13 * * 0'   # Every Sunday 8 AM CT (13:00 UTC)
  workflow_dispatch:         # Allow manual trigger from GitHub Actions UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate weekly summary
        env:
          ELEMENT_API_KEY: ${{ secrets.ELEMENT_API_KEY }}
        run: python generate_summary.py

      - name: Commit weekly-summary.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weekly-summary.json
          git diff --cached --quiet || git commit -m "chore: weekly AI health summary $(date -u +%Y-%m-%d)"
          git push
