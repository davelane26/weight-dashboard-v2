name: Garmin Backfill

on:
  workflow_dispatch:  # Manual trigger only
    inputs:
      days:
        description: 'Number of days to backfill'
        required: true
        default: '30'

jobs:
  backfill:
    runs-on: [self-hosted, home-pc, garmin]
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
        continue-on-error: true

      - name: Install dependencies
        run: pip install -r garmin_sync/requirements.txt

      # Session persists on self-hosted runner between runs

      - name: Backfill Garmin data
        working-directory: garmin_sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          GARMIN_SESSION: ${{ secrets.GARMIN_SESSION }}
          GARMIN_COOKIES: ${{ secrets.GARMIN_COOKIES }}
        run: python sync_garmin.py --days ${{ inputs.days }}
