name: Garmin Sync

on:
  schedule:
    # Every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:  # Manual trigger button in GitHub UI

jobs:
  sync:
    runs-on: [self-hosted, home-pc, garmin]
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # NOTE: on self-hosted runner Python must be pre-installed
        continue-on-error: true  # skip gracefully if already installed

      - name: Install dependencies
        run: pip install -r garmin_sync/requirements.txt

      # Session file persists in runner's tool cache between runs
      # (no expiry drama — garth auto-refreshes from refresh_token)

      - name: Sync Garmin data to Firebase
        working-directory: garmin_sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          GARMIN_SESSION: ${{ secrets.GARMIN_SESSION }}
          GARMIN_COOKIES: ${{ secrets.GARMIN_COOKIES }}
        run: python sync_garmin.py --today
