name: Sync Dexcom G7 Glucose Data

on:
  workflow_dispatch: # manual only - replaced by Cloudflare Worker + xDrip+

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch glucose data
        env:
          DEXCOM_USERNAME: ${{ secrets.DEXCOM_USERNAME }}
          DEXCOM_PASSWORD: ${{ secrets.DEXCOM_PASSWORD }}
        run: python fetch_glucose.py

      - name: Commit glucose.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add glucose.json
          git diff --cached --quiet || git commit -m "chore: sync glucose data"
          git push
